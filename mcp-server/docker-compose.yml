services:
  i2t-docs-mcp:
    build: .
    image: i2t-docs-mcp:latest
    pull_policy: build
    container_name: i2t-docs-mcp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MCP_ROOT: /data
      PORT: 3000
    volumes:
      # Only the docs/ content, mounted read-only — not the whole repo
      # (no .git, node_modules, build output). Relative paths are resolved
      # against this compose file's directory, so the default just works
      # against a normal checkout. Override REPO_PATH to point elsewhere
      # (e.g. a dedicated synced checkout in production).
      - ${REPO_PATH:-../docs}:/data:ro
    ports:
      # Bind to loopback only — Caddy (running on the host) reverse-proxies
      # to this port; it's never reachable directly from the network.
      - "127.0.0.1:3000:3000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
